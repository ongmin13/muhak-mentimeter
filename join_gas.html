<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>무학고 부자캠프 - 참여</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#FBF2E2; --panel:#FFFFFF; --panel2:#F3E4CC;
  --accent:#D97A42; --accent2:#8C5A2B; --text:#3A2A1E;
  --muted:#9C8770; --line:#E6D4B8;
  --father:#4A7FA5; --son:#5A9E6F;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  margin:0;
  font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100%; display:flex; align-items:flex-start;
  justify-content:center; padding:24px 16px 40px;
}
.card{width:100%; max-width:480px;}

/* 입장 화면 */
.join-header{text-align:center; margin-bottom:28px;}
.join-header .emoji{font-size:52px; margin-bottom:10px;}
h1{font-size:22px; margin:0 0 6px; font-weight:800;}
h1 span{color:var(--accent);}
.sub{color:var(--muted); font-size:14px;}
.join-box input{
  width:100%; padding:18px; font-size:28px; text-align:center;
  letter-spacing:8px; border-radius:14px; border:2px solid var(--line);
  background:var(--panel); color:var(--text); margin-bottom:12px; font-weight:700;
}
.join-box input:focus{outline:none; border-color:var(--accent);}
.join-box button{
  width:100%; padding:16px; border:none; border-radius:14px;
  background:var(--accent); color:#FBF2E2; font-weight:800; font-size:17px; cursor:pointer;
}
.join-box button:active{opacity:.85;}
.err{color:#c0392b; text-align:center; font-size:13px; margin-top:10px; min-height:18px;}

/* 역할 선택 화면 */
.role-screen{text-align:center; padding:10px 0;}
.role-title{font-size:20px; font-weight:800; margin-bottom:6px;}
.role-sub{color:var(--muted); font-size:13px; margin-bottom:28px;}
.role-row{display:flex; gap:14px;}
.role-btn{
  flex:1; padding:36px 0; border-radius:20px; border:2px solid var(--line);
  background:var(--panel); cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:10px; -webkit-appearance:none; transition:.15s;
}
.role-btn:active{transform:scale(.97); opacity:.85;}
.role-btn .r-emoji{font-size:52px;}
.role-btn .r-label{font-size:18px; font-weight:800; color:var(--text);}
.role-btn.father{border-color:var(--father);}
.role-btn.father .r-label{color:var(--father);}
.role-btn.son{border-color:var(--son);}
.role-btn.son .r-label{color:var(--son);}

/* 대기 화면 */
.wait{text-align:center; padding:60px 0; font-size:16px; color:var(--muted); line-height:2.2;}
.wait .emoji{font-size:48px; display:block; margin-bottom:12px;}
.dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); margin:0 3px; animation:blink 1.4s infinite;}
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;} 40%{opacity:1;}}

/* 역할 배지 */
.role-badge{
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700;
  margin-bottom:14px;
}
.role-badge.father{background:#EBF4FB; color:var(--father); border:1px solid var(--father);}
.role-badge.son{background:#EBF6EF; color:var(--son); border:1px solid var(--son);}

/* 슬라이드 화면 */
.slide-wrap{display:flex; flex-direction:column; gap:16px;}
.progress-wrap{padding:0 2px;}
.progress-bar-bg{height:8px; background:var(--panel2); border-radius:999px; overflow:hidden;}
.progress-bar-fill{height:100%; background:var(--accent); border-radius:999px; transition:width .4s ease;}
.progress-text{text-align:center; font-size:12px; color:var(--muted); margin-top:6px; font-weight:600;}
.q-card{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px 18px;}
.q-type{display:inline-block; font-size:11px; color:var(--accent); border:1px solid var(--accent); padding:3px 10px; border-radius:999px; margin-bottom:10px;}
.q-text{font-size:20px; font-weight:800; line-height:1.5; margin-bottom:20px; word-break:keep-all;}
.mc-opt{
  display:block; width:100%; text-align:left; padding:16px; margin-bottom:10px;
  border-radius:13px; border:2px solid var(--line); background:var(--panel2);
  color:var(--text); font-size:16px; cursor:pointer; font-family:inherit; font-weight:500;
  -webkit-appearance:none; transition:.12s;
}
.mc-opt:last-of-type{margin-bottom:0;}
.mc-opt:active{opacity:.8;}
.mc-opt.picked{border-color:var(--accent); background:#FBE6D3; font-weight:700; color:var(--accent2);}
.ox-row{display:flex; gap:14px;}
.ox-btn{
  flex:1; height:130px; border-radius:18px; border:2px solid var(--line);
  background:var(--panel2); font-size:52px; font-weight:900; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  -webkit-appearance:none; transition:.12s;
}
.ox-btn:active{opacity:.8; transform:scale(.97);}
.ox-btn.o{color:var(--accent);}
.ox-btn.x{color:var(--accent2);}
.ox-btn.picked{border-color:currentColor; background:#FBE6D3; border-width:3px;}
.wc-area textarea{
  width:100%; min-height:100px; padding:14px; border-radius:13px;
  border:2px solid var(--line); background:var(--panel2); color:var(--text);
  font-size:16px; font-family:inherit; resize:none; line-height:1.6;
}
.wc-area textarea:focus{outline:none; border-color:var(--accent);}
.quiz-image{width:100%;max-height:220px;object-fit:contain;border-radius:12px;margin-bottom:12px;border:1px solid var(--line);}
.answered-badge{
  text-align:center; color:var(--accent); font-weight:700; font-size:14px;
  padding:10px 0; background:#FBE6D3; border-radius:10px; margin-top:4px;
}
.nav-row{display:flex; gap:10px;}
.nav-btn{
  flex:1; padding:16px; border-radius:13px; border:2px solid var(--line);
  background:var(--panel); color:var(--text); font-size:15px; cursor:pointer;
  font-weight:700; font-family:inherit; -webkit-appearance:none;
}
.nav-btn:active{opacity:.8;}
.nav-btn.submit{flex:2; background:var(--accent); border-color:var(--accent); color:#FBF2E2; font-size:16px;}
.nav-btn:disabled{opacity:.35; cursor:not-allowed;}

/* 퀴즈 오버레이 */
.quiz-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center;
  z-index:200; padding:20px;
}
.quiz-overlay.show{display:flex;}
.quiz-popup{
  background:var(--panel); border-radius:20px; padding:24px 20px;
  width:100%; max-width:480px; max-height:85vh; overflow-y:auto;
}
.quiz-popup .q-badge{
  display:inline-block; font-size:11px; padding:3px 10px;
  border-radius:999px; background:#fff3e0; color:#b34700;
  font-weight:700; margin-bottom:12px;
}
.quiz-popup .q-text{font-size:20px;font-weight:800;line-height:1.5;margin-bottom:18px;word-break:keep-all;}
.quiz-waiting{text-align:center;padding:20px 0;color:var(--muted);font-size:14px;}
/* 정답/오답 결과 화면 */
.quiz-result{text-align:center;padding:20px 0;}
.quiz-result .result-icon{font-size:72px;margin-bottom:12px;}
.quiz-result .result-text{font-size:24px;font-weight:900;margin-bottom:8px;}
.quiz-result.correct .result-text{color:#5A9E6F;}
.quiz-result.wrong .result-text{color:#c0392b;}
.quiz-result .correct-answer{font-size:14px;color:var(--muted);margin-top:6px;}
.quiz-result .correct-answer b{color:var(--text);}
/* 애니메이션 */
@keyframes popResult{
  0%{transform:scale(.5);opacity:0;}
  70%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}
.quiz-result .result-icon{animation:popResult .4s ease forwards;}
.done-screen{text-align:center; padding:60px 0;}
.done-screen .emoji{font-size:64px; margin-bottom:16px; display:block;}
.done-screen .msg{font-size:22px; font-weight:800; color:var(--accent); margin-bottom:8px;}
.done-screen .sub2{color:var(--muted); font-size:14px; line-height:1.8;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="join-header">
    <div class="emoji">👨‍👦</div>
    <h1>무학고 <span>부자캠프</span></h1>
    <div class="sub">선생님이 알려준 입장 코드를 입력하세요</div>
  </div>
  <div class="join-box">
    <input type="tel" id="codeInput" maxlength="4" inputmode="numeric" placeholder="0000">
    <button id="joinBtn">입장하기</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<!-- 퀴즈 오버레이 -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-popup" id="quizPopup"></div>
</div>

<script>
const QUIZ_TYPES = ['ox_quiz','short_quiz','image_quiz'];
function escapeHtml(str){ return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }
const firebaseConfig = {
  apiKey: "AIzaSyAILcmL4AoAUtw1UW9h8eXtolBXFVhiAzE",
  authDomain: "muhak-mentimeter.firebaseapp.com",
  databaseURL: "https://muhak-mentimeter-default-rtdb.firebaseio.com",
  projectId: "muhak-mentimeter",
  storageBucket: "muhak-mentimeter.firebasestorage.app",
  messagingSenderId: "961075824863",
  appId: "1:961075824863:web:6bc1f37482e2a9e38f816a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sessionCode = null;
let participantId = null;
let myRole = null; // 'father' | 'son'
let slides = [];
let currentIdx = 0;
let answers = {};
let submitted = {};

const params = new URLSearchParams(location.search);
const urlCode = params.get('code');
if(urlCode){ document.getElementById('codeInput').value = urlCode; tryJoin(urlCode); }

document.getElementById('joinBtn').onclick = ()=> tryJoin(document.getElementById('codeInput').value.trim());
document.getElementById('codeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryJoin(document.getElementById('codeInput').value.trim()); });

function tryJoin(code){
  const errEl = document.getElementById('errMsg');
  errEl.textContent = '';
  if(!/^\d{4}$/.test(code)){ errEl.textContent = '4자리 숫자 코드를 입력해주세요.'; return; }
  db.ref('sessions/'+code).get().then(snap=>{
    if(!snap.exists()){ errEl.textContent = '존재하지 않는 코드입니다.'; return; }
    sessionCode = code;
    participantId = db.ref().push().key;
    showRoleSelect();
  });
}

function showRoleSelect(){
  document.getElementById('card').innerHTML = `
    <div class="role-screen">
      <div style="font-size:48px;margin-bottom:14px;">👨‍👦</div>
      <div class="role-title">나는 누구인가요?</div>
      <div class="role-sub">해당하는 역할을 선택해주세요</div>
      <div class="role-row">
        <button class="role-btn father" id="fatherBtn">
          <span class="r-emoji">👨</span>
          <span class="r-label">아버지</span>
        </button>
        <button class="role-btn son" id="sonBtn">
          <span class="r-emoji">👦</span>
          <span class="r-label">아들</span>
        </button>
      </div>
    </div>`;
  document.getElementById('fatherBtn').onclick = ()=> selectRole('father');
  document.getElementById('sonBtn').onclick = ()=> selectRole('son');
}

function selectRole(role){
  myRole = role;
  db.ref('sessions/'+sessionCode+'/participants/'+participantId).set({
    joinedAt: Date.now(), role
  });
  listenSession();
}

function listenSession(){
  showWait();
  db.ref('sessions/'+sessionCode+'/started').on('value', snap=>{
    if(snap.val() === true){ listenSlides(); }
    else { showWait(); }
  });
  listenQuizState();
}

// 슬라이드 전체 캐시 (퀴즈 팝업에서 사용)
let slides_cache = {};
let myQuizAnswer = null;
let currentQuizId = null;

function listenQuizState(){
  db.ref('sessions/'+sessionCode+'/quizState').on('value', snap=>{
    const state = snap.val()||{};
    const qid = state.activeQuizId;
    const revealed = !!state.revealed;
    const overlay = document.getElementById('quizOverlay');

    if(qid && slides_cache[qid]){
      overlay.classList.add('show');
      if(currentQuizId !== qid){
        // 새 퀴즈 시작
        currentQuizId = qid;
        myQuizAnswer = null;
        renderQuizPopup(slides_cache[qid], qid);
      } else if(revealed && myQuizAnswer !== null){
        // 정답 공개
        renderQuizResult(slides_cache[qid], qid);
      } else if(revealed && myQuizAnswer === null){
        // 답 안 냈는데 공개됨
        renderQuizResult(slides_cache[qid], qid, true);
      }
    } else if(!qid){
      overlay.classList.remove('show');
      currentQuizId = null;
      myQuizAnswer = null;
    }
  });
}

function renderQuizPopup(s, qid){
  const typeLabel = {ox_quiz:'OX퀴즈', short_quiz:'단답형퀴즈', image_quiz:'이미지퀴즈'};
  const imgHtml = s.type==='image_quiz' && s.imageUrl
    ? `<img src="${escapeHtml(s.imageUrl)}" class="quiz-image" onerror="this.style.display='none'">` : '';

  let inputHtml = '';
  if(s.type==='ox_quiz'){
    inputHtml = `<div class="ox-row">
      <button class="ox-btn o" data-val="O">O</button>
      <button class="ox-btn x" data-val="X">X</button>
    </div>`;
  } else {
    inputHtml = `<textarea id="quizTextInput" placeholder="답을 입력하세요" maxlength="50"
      style="width:100%;min-height:70px;padding:12px;border-radius:11px;border:2px solid var(--line);
      background:var(--panel2);color:var(--text);font-size:16px;font-family:inherit;resize:none;"></textarea>
      <button class="nav-btn submit" id="quizSubmitTextBtn" style="width:100%;margin-top:10px;padding:14px;border:none;border-radius:11px;background:var(--accent);color:#FBF2E2;font-weight:800;font-size:15px;cursor:pointer;">제출하기</button>`;
  }

  const submitted = myQuizAnswer !== null;
  document.getElementById('quizPopup').innerHTML = `
    <div class="quiz-badge">${typeLabel[s.type]||s.type}</div>
    ${imgHtml}
    <div class="q-text">${escapeHtml(s.question)}</div>
    ${submitted
      ? `<div class="answered-badge">✓ 제출 완료 (${escapeHtml(String(myQuizAnswer))}) · 정답 발표를 기다리는 중...</div>`
      : inputHtml}`;

  if(!submitted){
    if(s.type==='ox_quiz'){
      document.querySelectorAll('#quizPopup [data-val]').forEach(btn=>{
        btn.onclick = ()=>{
          myQuizAnswer = btn.dataset.val;
          db.ref('sessions/'+sessionCode+'/responses/'+qid+'/'+participantId).set({value:myQuizAnswer, role:myRole});
          renderQuizPopup(s, qid);
        };
      });
    } else {
      document.getElementById('quizSubmitTextBtn').onclick = ()=>{
        const val = document.getElementById('quizTextInput').value.trim();
        if(!val) return;
        myQuizAnswer = val;
        db.ref('sessions/'+sessionCode+'/responses/'+qid+'/'+participantId).set({value:val, role:myRole});
        renderQuizPopup(s, qid);
      };
    }
  }
}

function renderQuizResult(s, qid, noAnswer=false){
  const correct = s.answer?.trim().toLowerCase();
  const myAns = myQuizAnswer?.trim().toLowerCase();
  const isCorrect = !noAnswer && myAns === correct;
  const icon = noAnswer ? '😅' : isCorrect ? '🎉' : '😢';
  const text = noAnswer ? '시간 초과' : isCorrect ? '정답!' : '오답!';
  const cls = noAnswer ? '' : isCorrect ? 'correct' : 'wrong';
  document.getElementById('quizPopup').innerHTML = `
    <div class="quiz-result ${cls}">
      <div class="result-icon">${icon}</div>
      <div class="result-text">${text}</div>
      <div class="correct-answer">정답은 <b>${escapeHtml(String(s.answer))}</b> 입니다</div>
      ${myQuizAnswer ? `<div style="font-size:13px;color:var(--muted);margin-top:6px;">내 답: ${escapeHtml(String(myQuizAnswer))}</div>` : ''}
    </div>`
}

function showWait(){
  const roleLabel = myRole === 'father' ? '아버지' : '아들';
  const roleColor = myRole === 'father' ? 'var(--father)' : 'var(--son)';
  document.getElementById('card').innerHTML = `
    <div class="wait">
      <span class="emoji">👨‍👦</span>
      <span style="color:${roleColor};font-weight:700;">${roleLabel}</span>로 입장했습니다<br>
      선생님이 세션을 시작하기를 기다리는 중<br>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>`;
}

function listenSlides(){
  db.ref('sessions/'+sessionCode+'/slides').on('value', snap=>{
    const raw = snap.val()||{};
    // 전체 슬라이드 캐시 (퀴즈 팝업용)
    slides_cache = raw;
    // 내 역할에 맞는 슬라이드만 필터링 (공통 + 내 역할, 퀴즈 제외)
    slides = Object.entries(raw)
      .sort((a,b)=>a[1].createdAt - b[1].createdAt)
      .map(([id,s])=>({id,...s}))
      .filter(s=> !QUIZ_TYPES.includes(s.type))
      .filter(s=> !s.target || s.target==='all' || s.target===myRole);
    if(slides.length === 0){ showWait(); }
    else { renderSlide(currentIdx); }
  });
}

function renderSlide(idx){
  if(!slides.length) return;
  currentIdx = Math.max(0, Math.min(idx, slides.length-1));
  const s = slides[currentIdx];
  const typeLabel = {mc:'객관식 투표', wordcloud:'워드클라우드', ox:'OX 투표', ox_quiz:'🏆 OX퀴즈', short_quiz:'🏆 단답형퀴즈', image_quiz:'🏆 이미지퀴즈'};
  const pct = Math.round(((currentIdx+1)/slides.length)*100);
  const isLast = currentIdx === slides.length-1;
  const roleLabel = myRole==='father' ? '👨 아버지' : '👦 아들';
  const roleCls = myRole==='father' ? 'father' : 'son';

  let bodyHtml = '';
  if(s.type==='mc'){
    bodyHtml = s.options.map(o=>
      `<button class="mc-opt${answers[s.id]===o?' picked':''}" data-val="${escapeAttr(o)}">${escapeHtml(o)}</button>`
    ).join('');
  } else if(s.type==='ox'){
    bodyHtml = `<div class="ox-row">
      <button class="ox-btn o${answers[s.id]==='O'?' picked':''}" data-val="O">O</button>
      <button class="ox-btn x${answers[s.id]==='X'?' picked':''}" data-val="X">X</button>
    </div>`;
  } else if(s.type==='ox_quiz'){
    bodyHtml = `<div style="margin-bottom:8px;font-size:12px;color:var(--muted);">O 또는 X를 선택하세요</div>
    <div class="ox-row">
      <button class="ox-btn o${answers[s.id]==='O'?' picked':''}" data-val="O">O</button>
      <button class="ox-btn x${answers[s.id]==='X'?' picked':''}" data-val="X">X</button>
    </div>`;
  } else if(s.type==='wordcloud'){
    bodyHtml = `<div class="wc-area">
      <textarea id="wcInput" placeholder="한 단어 또는 짧은 문장을 입력하세요" maxlength="30">${answers[s.id]||''}</textarea>
    </div>`;
  } else if(s.type==='short_quiz'){
    bodyHtml = `<div class="wc-area">
      <textarea id="shortInput" placeholder="답을 입력하세요" maxlength="50" style="min-height:70px;">${answers[s.id]||''}</textarea>
    </div>`;
  } else if(s.type==='image_quiz'){
    const imgHtml = s.imageUrl ? `<img src="${escapeHtml(s.imageUrl)}" class="quiz-image" onerror="this.style.display='none'">` : '';
    bodyHtml = `${imgHtml}<div class="wc-area">
      <textarea id="imageInput" placeholder="답을 입력하세요" maxlength="50" style="min-height:70px;">${answers[s.id]||''}</textarea>
    </div>`;
  }

  document.getElementById('card').innerHTML = `
    <div class="slide-wrap">
      <div class="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${currentIdx+1} / ${slides.length}</div>
      </div>
      <div class="q-card">
        <div><span class="role-badge ${roleCls}">${roleLabel}</span></div>
        <div class="q-type">${typeLabel[s.type]||s.type}</div>
        <div class="q-text">${escapeHtml(s.question)}</div>
        ${bodyHtml}
        ${submitted[s.id] ? '<div class="answered-badge">✓ 제출 완료</div>' : ''}
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="prevBtn" ${currentIdx===0?'disabled':''}>← 이전</button>
        <button class="nav-btn submit" id="submitBtn">${isLast ? '완료 🎉' : '다음 →'}</button>
      </div>
    </div>`;

  if(s.type==='mc'||s.type==='ox'||s.type==='ox_quiz'){
    document.querySelectorAll('[data-val]').forEach(btn=>{
      btn.onclick = ()=>{ answers[s.id]=btn.dataset.val; renderSlide(currentIdx); };
    });
  }
  document.getElementById('prevBtn').onclick = ()=> renderSlide(currentIdx-1);
  document.getElementById('submitBtn').onclick = ()=> submitAndNext(s, isLast);
}

function submitAndNext(s, isLast){
  let val = answers[s.id];
  if(s.type==='wordcloud'){
    val = document.getElementById('wcInput')?.value.trim();
    if(val) answers[s.id] = val;
  } else if(s.type==='short_quiz'){
    val = document.getElementById('shortInput')?.value.trim();
    if(val) answers[s.id] = val;
  } else if(s.type==='image_quiz'){
    val = document.getElementById('imageInput')?.value.trim();
    if(val) answers[s.id] = val;
  }
  if(val !== undefined && val !== ''){
    db.ref('sessions/'+sessionCode+'/responses/'+s.id+'/'+participantId).set({
      value: val, role: myRole
    });
    submitted[s.id] = true;
  }
  if(isLast){ showDone(); }
  else { renderSlide(currentIdx+1); }
}

function showDone(){
  const roleLabel = myRole==='father' ? '아버지' : '아들';
  document.getElementById('card').innerHTML = `
    <div class="done-screen">
      <span class="emoji">🎉</span>
      <div class="msg">모든 답변 완료!</div>
      <div class="sub2">${roleLabel}로 참여해줘서 고마워요<br>👨‍👦 소중한 시간이었어요</div>
    </div>`;
}

function escapeHtml(str){ return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }
</script>
