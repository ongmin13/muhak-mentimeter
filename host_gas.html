<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무학고 부자캠프 - 발표자</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#FBF2E2;
  --panel:#FFFFFF;
  --panel2:#F3E4CC;
  --accent:#D97A42;
  --accent2:#8C5A2B;
  --text:#3A2A1E;
  --muted:#9C8770;
  --line:#E6D4B8;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 28px; border-bottom:1px solid var(--line);
  background:var(--panel);
}
.topbar h1{font-size:18px; margin:0; font-weight:700; letter-spacing:-0.3px;}
.topbar h1 span{color:var(--accent);}
.session-info{display:flex; align-items:center; gap:14px;}
.code-pill{
  background:var(--panel2); border:1px solid var(--line); border-radius:999px;
  padding:8px 18px; font-size:15px; font-weight:600; letter-spacing:2px;
}
.code-pill b{color:var(--accent2); font-size:18px;}
.qr-btn{
  background:transparent; border:1px solid var(--line); color:var(--text);
  border-radius:10px; padding:8px 14px; cursor:pointer; font-size:13px;
}
.qr-btn:hover{border-color:var(--accent);}

.layout{display:grid; grid-template-columns:320px 1fr; min-height:calc(100vh - 64px);}
.sidebar{
  border-right:1px solid var(--line); padding:20px; background:var(--panel);
  overflow-y:auto;
}
.sidebar h2{font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:0 0 12px;}
.slide-list{display:flex; flex-direction:column; gap:8px; margin-bottom:20px;}
.slide-item{
  background:var(--panel2); border:1px solid var(--line); border-radius:10px;
  padding:10px 12px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:space-between;
  transition:.15s;
}
.slide-item:hover{border-color:var(--accent);}
.slide-item.active{border-color:var(--accent); background:#FBE6D3;}
.slide-item .tag{
  font-size:10px; padding:2px 7px; border-radius:6px; background:var(--line); color:var(--muted);
}
.slide-item .del{color:#ff6b6b; cursor:pointer; font-size:12px; margin-left:6px;}

.add-section{border-top:1px solid var(--line); padding-top:16px;}
.type-tabs{display:flex; gap:6px; margin-bottom:10px;}
.type-tabs button{
  flex:1; padding:8px 0; border-radius:8px; border:1px solid var(--line); background:var(--panel2);
  color:var(--muted); font-size:12px; cursor:pointer;
}
.type-tabs button.sel{border-color:var(--accent); color:var(--accent); background:#FBE6D3;}
input[type=text], textarea{
  width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
  background:var(--panel2); color:var(--text); font-size:14px; margin-bottom:8px; font-family:inherit;
}
.opt-row{display:flex; gap:6px; margin-bottom:6px;}
.opt-row input{flex:1; margin-bottom:0;}
.opt-row button{background:var(--line); border:none; color:var(--muted); border-radius:6px; padding:0 10px; cursor:pointer;}
.small-btn{
  background:transparent; border:1px dashed var(--line); color:var(--muted);
  border-radius:8px; padding:7px; font-size:12px; cursor:pointer; width:100%; margin-bottom:10px;
}
.primary-btn{
  width:100%; padding:11px; border:none; border-radius:9px; background:var(--accent);
  color:#FBF2E2; font-weight:700; font-size:14px; cursor:pointer;
}
.primary-btn:hover{opacity:.9;}

.stage{padding:32px; display:flex; flex-direction:column; align-items:center;}
.stage-empty{margin:auto; color:var(--muted); text-align:center; font-size:15px;}
.question-card{width:100%; max-width:780px; text-align:center; margin-bottom:28px;}
.q-type{
  display:inline-block; font-size:12px; color:var(--accent); border:1px solid var(--accent);
  padding:3px 10px; border-radius:999px; margin-bottom:14px; letter-spacing:.5px;
}
.q-text{font-size:30px; font-weight:800; letter-spacing:-0.5px; line-height:1.4;}
.resp-count{color:var(--muted); font-size:13px; margin-top:6px;}

.results{width:100%; max-width:780px;}
.bar-row{margin-bottom:16px;}
.bar-label{display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px;}
.bar-track{height:38px; background:var(--panel2); border-radius:8px; overflow:hidden; border:1px solid var(--line);}
.bar-fill{
  height:100%; background:linear-gradient(90deg,var(--accent),#C2542A);
  display:flex; align-items:center; justify-content:flex-end; padding-right:10px;
  color:#FBF2E2; font-weight:700; font-size:13px; transition:width .4s ease; min-width:2%;
}
.ox-wrap{display:flex; gap:20px; justify-content:center;}
.ox-box{
  flex:1; max-width:280px; padding:34px 0; border-radius:16px; text-align:center;
  background:var(--panel2); border:1px solid var(--line);
}
.ox-box .mark{font-size:48px; font-weight:900;}
.ox-box.o .mark{color:var(--accent);}
.ox-box.x .mark{color:var(--accent2);}
.ox-box .cnt{font-size:22px; margin-top:8px; font-weight:700;}

.cloud{display:flex; flex-wrap:wrap; gap:12px 18px; justify-content:center; align-items:center; padding:20px;}
.cloud-word{
  display:inline-block;
  font-weight:800;
  transform-origin:center bottom;
  animation-name:sway;
  animation-timing-function:ease-in-out;
  animation-iteration-count:infinite;
}
.cloud-word .inner{
  display:inline-block;
  transition:transform .25s ease;
}
.cloud-word:hover .inner{
  transform:scale(1.22);
}
@keyframes sway{
  0%   { transform:rotate(-4deg); }
  50%  { transform:rotate(4deg); }
  100% { transform:rotate(-4deg); }
}

.qr-modal{
  position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:50;
}
.qr-modal.show{display:flex;}
.qr-box{background:#fff; padding:28px; border-radius:18px; text-align:center; border:1px solid #E6D4B8;}
.qr-box p{color:#111; font-weight:700; margin:14px 0 0; font-size:15px;}
.qr-box .codebig{color:#0f1115; font-size:26px; font-weight:900; letter-spacing:4px; margin-top:6px;}
.qr-box .close-x{margin-top:16px; cursor:pointer; color:#888; font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <h1>무학고 <span>부자캠프</span> · 발표자 화면</h1>
  <div class="session-info">
    <div class="code-pill" id="codePill">입장 코드 생성 중...</div>
    <button class="qr-btn" id="qrOpenBtn">QR코드 보기</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>슬라이드 목록</h2>
    <div class="slide-list" id="slideList"></div>

    <div class="add-section">
      <h2>슬라이드 추가</h2>
      <div class="type-tabs">
        <button data-type="mc" class="sel">객관식</button>
        <button data-type="wordcloud">워드클라우드</button>
        <button data-type="ox">OX</button>
      </div>
      <input type="text" id="qInput" placeholder="질문을 입력하세요">
      <div id="optsArea"></div>
      <button class="small-btn" id="addOptBtn">+ 보기 추가</button>
      <button class="primary-btn" id="createSlideBtn">슬라이드 만들기</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="stage-empty">왼쪽에서 슬라이드를 만들고 클릭하면<br>여기에 표시되고 학생 화면에 송출됩니다.</div>
  </div>
</div>

<div class="qr-modal" id="qrModal">
  <div class="qr-box">
    <div id="qrcode"></div>
    <p>학생들에게 이 QR을 보여주세요</p>
    <div class="codebig" id="codeBigText">----</div>
    <div class="close-x" id="qrCloseBtn">닫기</div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAILcmL4AoAUtw1UW9h8eXtolBXFVhiAzE",
  authDomain: "muhak-mentimeter.firebaseapp.com",
  databaseURL: "https://muhak-mentimeter-default-rtdb.firebaseio.com",
  projectId: "muhak-mentimeter",
  storageBucket: "muhak-mentimeter.firebasestorage.app",
  messagingSenderId: "961075824863",
  appId: "1:961075824863:web:6bc1f37482e2a9e38f816a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let sessionCode = null;
let currentType = 'mc';
let slides = {};      // id -> slide object
let activeSlideId = null;
let respUnsub = null;

function genCode(){
  return String(Math.floor(1000 + Math.random()*9000));
}

function startSession(){
  sessionCode = genCode();
  document.getElementById('codePill').innerHTML = '입장 코드 <b>'+sessionCode+'</b>';
  document.getElementById('codeBigText').textContent = sessionCode;
  db.ref('sessions/'+sessionCode).set({createdAt: Date.now(), active: null});
  const joinUrl = location.href.replace('host_gas.html', 'join_gas.html') + '?code=' + sessionCode;
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {text: joinUrl, width:200, height:200});
}
startSession();

document.getElementById('qrOpenBtn').onclick = ()=> document.getElementById('qrModal').classList.add('show');
document.getElementById('qrCloseBtn').onclick = ()=> document.getElementById('qrModal').classList.remove('show');

// --- 슬라이드 생성 폼 ---
const typeTabs = document.querySelectorAll('.type-tabs button');
typeTabs.forEach(btn=>{
  btn.onclick = ()=>{
    typeTabs.forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    currentType = btn.dataset.type;
    renderOptsArea();
  };
});

function renderOptsArea(){
  const area = document.getElementById('optsArea');
  const addBtn = document.getElementById('addOptBtn');
  area.innerHTML = '';
  if(currentType === 'mc'){
    addBtn.style.display = 'block';
    addOptRow(); addOptRow();
  } else {
    addBtn.style.display = 'none';
  }
}
function addOptRow(val=''){
  const area = document.getElementById('optsArea');
  const row = document.createElement('div');
  row.className = 'opt-row';
  row.innerHTML = `<input type="text" class="optInput" placeholder="보기 ${area.children.length+1}" value="${val}"><button onclick="this.parentElement.remove()">삭제</button>`;
  area.appendChild(row);
}
document.getElementById('addOptBtn').onclick = ()=> addOptRow();
renderOptsArea();

document.getElementById('createSlideBtn').onclick = ()=>{
  const q = document.getElementById('qInput').value.trim();
  if(!q){ alert('질문을 입력해주세요.'); return; }
  let slide = {type: currentType, question: q, createdAt: Date.now()};
  if(currentType === 'mc'){
    const opts = [...document.querySelectorAll('.optInput')].map(i=>i.value.trim()).filter(Boolean);
    if(opts.length < 2){ alert('보기를 2개 이상 입력해주세요.'); return; }
    slide.options = opts;
  }
  const ref = db.ref('sessions/'+sessionCode+'/slides').push();
  ref.set(slide);
  document.getElementById('qInput').value = '';
  renderOptsArea();
};

// --- 슬라이드 목록 실시간 구독 ---
db.ref('sessions/'+sessionCode+'/slides').on('value', snap=>{
  slides = snap.val() || {};
  const list = document.getElementById('slideList');
  list.innerHTML = '';
  const typeLabel = {mc:'객관식', wordcloud:'워드클라우드', ox:'OX'};
  Object.entries(slides).forEach(([id, s])=>{
    const item = document.createElement('div');
    item.className = 'slide-item' + (id===activeSlideId ? ' active':'');
    item.innerHTML = `<span>${s.question.slice(0,16)}${s.question.length>16?'…':''}</span>
      <span><span class="tag">${typeLabel[s.type]}</span> <span class="del" title="삭제">✕</span></span>`;
    item.querySelector('.del').onclick = (e)=>{
      e.stopPropagation();
      if(confirm('이 슬라이드를 삭제할까요?')) db.ref('sessions/'+sessionCode+'/slides/'+id).remove();
    };
    item.onclick = ()=> activateSlide(id);
    list.appendChild(item);
  });
});

function activateSlide(id){
  activeSlideId = id;
  const s = slides[id];
  db.ref('sessions/'+sessionCode+'/active').set({id, ...s});
  // 목록 active 표시 갱신
  document.querySelectorAll('.slide-item').forEach(el=>el.classList.remove('active'));
  renderStageQuestion(s);
  if(respUnsub) respUnsub();
  db.ref('sessions/'+sessionCode+'/responses/'+id).off();
  db.ref('sessions/'+sessionCode+'/responses/'+id).on('value', snap=>{
    renderResults(s, snap.val() || {});
  });
}

function renderStageQuestion(s){
  const typeLabel = {mc:'객관식 투표', wordcloud:'워드클라우드', ox:'OX 투표'};
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div class="question-card">
      <div class="q-type">${typeLabel[s.type]}</div>
      <div class="q-text">${escapeHtml(s.question)}</div>
      <div class="resp-count" id="respCount">응답 0개</div>
    </div>
    <div class="results" id="resultsArea"></div>
  `;
}

function renderResults(s, responses){
  const vals = Object.values(responses);
  document.getElementById('respCount').textContent = '응답 ' + vals.length + '개';
  const area = document.getElementById('resultsArea');

  if(s.type === 'mc'){
    const counts = {};
    s.options.forEach(o=> counts[o] = 0);
    vals.forEach(v=>{ if(counts[v] !== undefined) counts[v]++; });
    const max = Math.max(1, ...Object.values(counts));
    area.innerHTML = s.options.map(o=>{
      const c = counts[o];
      const pct = Math.round((c/max)*100);
      return `<div class="bar-row">
        <div class="bar-label"><span>${escapeHtml(o)}</span><span>${c}표</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%">${c>0?c:''}</div></div>
      </div>`;
    }).join('');
  }
  else if(s.type === 'ox'){
    const oCount = vals.filter(v=>v==='O').length;
    const xCount = vals.filter(v=>v==='X').length;
    area.innerHTML = `<div class="ox-wrap">
      <div class="ox-box o"><div class="mark">O</div><div class="cnt">${oCount}</div></div>
      <div class="ox-box x"><div class="mark">X</div><div class="cnt">${xCount}</div></div>
    </div>`;
  }
  else if(s.type === 'wordcloud'){
    const freq = {};
    vals.forEach(v=>{
      const w = String(v).trim();
      if(!w) return;
      freq[w] = (freq[w]||0) + 1;
    });
    const entries = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    const max = Math.max(1, ...entries.map(e=>e[1]));
    const colors = ['#D97A42','#8C5A2B','#E8A23D','#B5562E','#C97B3D'];
    area.innerHTML = `<div class="cloud">${entries.map(([w,c],i)=>{
      const size = 14 + (c/max)*46;
      const color = colors[i % colors.length];
      // 단어마다 흔들리는 속도와 시작 타이밍을 살짝 다르게 줘서 자연스럽게
      const duration = (3 + Math.random()*2).toFixed(2);
      const delay = (Math.random()*3).toFixed(2);
      return `<span class="cloud-word" style="animation-duration:${duration}s; animation-delay:-${delay}s;">
        <span class="inner" style="font-size:${size}px; color:${color}">${escapeHtml(w)}</span>
      </span>`;
    }).join('')}</div>`;
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
</body>
</html>
